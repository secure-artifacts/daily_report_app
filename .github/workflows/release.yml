name: Build and Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
      attestations: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm

      - name: Install lockfile state
        run: npm ci

      - name: Syntax check
        run: npm run check

      - name: Dependency audit
        run: npm audit --audit-level=moderate

      - name: Package static web app
        run: |
          set -euo pipefail
          package_dir="dist/daily-report-app-${GITHUB_REF_NAME}"
          mkdir -p "$package_dir"
          cp index.html app.js styles.css vercel.json package.json package-lock.json README.md SECURITY_PRECHECK.md run_web_app.bat "$package_dir/"
          cp -R api "$package_dir/"
          cd dist
          zip -r "daily-report-app-${GITHUB_REF_NAME}.zip" "daily-report-app-${GITHUB_REF_NAME}"

      - name: Attest Build Provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: "dist/*.zip"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: "dist/*.zip"
          generate_release_notes: true
