name: Code Audit

on:
  push:
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm

      - name: Install lockfile state
        run: npm ci

      - name: Syntax check
        run: npm run check

      - name: Dependency audit
        run: npm audit --audit-level=moderate
